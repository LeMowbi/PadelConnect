<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Floppy Wings" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Floppy Wings</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="app">
    <!-- GAME CANVAS -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="score-display">
        <span id="current-score">0</span>
      </div>
      <div id="coin-display">
        <span class="coin-icon">🪙</span>
        <span id="coin-count">0</span>
      </div>
    </div>

    <!-- MAIN MENU -->
    <div id="menu-screen" class="screen">
      <div class="menu-logo">
        <h1 class="game-title">FLOPPY<br/><span>WINGS</span></h1>
        <div class="logo-bird" id="menu-bird-preview"></div>
      </div>
      <div class="menu-buttons">
        <button class="btn-primary" id="btn-play">JOUER</button>
        <button class="btn-secondary" id="btn-shop">BOUTIQUE</button>
        <button class="btn-secondary" id="btn-leaderboard">SCORES</button>
      </div>
      <div class="menu-footer">
        <span class="coin-icon">🪙</span>
        <span id="menu-coin-count">0</span>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameover-screen" class="screen hidden">
      <div class="gameover-panel">
        <h2>GAME OVER</h2>
        <div class="score-panel">
          <div class="score-row">
            <span>Score</span>
            <span id="final-score">0</span>
          </div>
          <div class="score-row">
            <span>Meilleur</span>
            <span id="best-score">0</span>
          </div>
          <div class="score-row coins-earned-row">
            <span>Pièces</span>
            <span id="coins-earned">+0</span>
          </div>
        </div>
        <div class="gameover-buttons">
          <button class="btn-primary" id="btn-retry">REJOUER</button>
          <button class="btn-secondary" id="btn-menu">MENU</button>
          <button class="btn-shop-go" id="btn-goto-shop">BOUTIQUE</button>
        </div>
        <div class="extra-coins-promo">
          <p>Manque de pièces ? Obtenez-en plus !</p>
          <button class="btn-iap-small" id="btn-buy-coins-go">💎 Acheter des pièces</button>
        </div>
      </div>
    </div>

    <!-- SHOP SCREEN -->
    <div id="shop-screen" class="screen hidden">
      <div class="shop-header">
        <button class="btn-back" id="btn-shop-back">←</button>
        <h2>BOUTIQUE</h2>
        <div class="shop-currency">
          <span class="coin-icon">🪙</span>
          <span id="shop-coin-count">0</span>
        </div>
      </div>

      <div class="shop-tabs">
        <button class="shop-tab active" data-tab="skins">Personnages</button>
        <button class="shop-tab" data-tab="backgrounds">Décors</button>
        <button class="shop-tab" data-tab="coins">Pièces</button>
      </div>

      <div class="shop-content">
        <!-- SKINS TAB -->
        <div class="tab-content active" id="tab-skins">
          <div class="shop-grid" id="skins-grid"></div>
        </div>

        <!-- BACKGROUNDS TAB -->
        <div class="tab-content" id="tab-backgrounds">
          <div class="shop-grid" id="backgrounds-grid"></div>
        </div>

        <!-- COINS TAB -->
        <div class="tab-content" id="tab-coins">
          <div class="coins-packages" id="coins-packages"></div>
        </div>
      </div>
    </div>

    <!-- LEADERBOARD SCREEN -->
    <div id="leaderboard-screen" class="screen hidden">
      <div class="shop-header">
        <button class="btn-back" id="btn-lb-back">←</button>
        <h2>MEILLEURS SCORES</h2>
      </div>
      <div class="leaderboard-list" id="leaderboard-list"></div>
    </div>

    <!-- IAP MODAL -->
    <div id="iap-modal" class="modal hidden">
      <div class="modal-overlay" id="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-icon" id="modal-icon"></div>
        <h3 id="modal-title"></h3>
        <p id="modal-desc"></p>
        <div class="modal-price" id="modal-price"></div>
        <div class="modal-buttons">
          <button class="btn-confirm" id="btn-confirm-purchase">Confirmer</button>
          <button class="btn-cancel" id="btn-cancel-purchase">Annuler</button>
        </div>
        <p class="modal-legal">Les achats sont définitifs et non remboursables. Nécessite une connexion Internet.</p>
      </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast hidden"></div>

    <!-- COUNTDOWN OVERLAY -->
    <div id="countdown" class="countdown hidden"></div>
  </div>

  <script src="src/skins.js"></script>
  <script src="src/iap.js"></script>
  <script src="src/shop.js"></script>
  <script src="src/game.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
